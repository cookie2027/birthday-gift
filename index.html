<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Happy Birthday 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff758c,#ff7eb3,#6a11cb,#2575fc);
background-size:400% 400%;
animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}

.container{
text-align:center;
color:white;
padding:25px;
width:95%;
max-width:450px;
z-index:10;
}

.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:20px;
padding:30px;
box-shadow:0 10px 40px rgba(0,0,0,.3);
animation:pop 1s ease;
}

@keyframes pop{
0%{
transform:scale(.5);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

h1{
font-size:40px;
margin-bottom:15px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px white;
}
to{
text-shadow:0 0 25px yellow;
}
}

h2{
font-size:26px;
margin-bottom:20px;
}

p{
font-size:18px;
line-height:1.6;
}

button{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:30px;
background:#ff4081;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
background:#ff0066;
}

/* Balloons */

.balloon{
position:absolute;
bottom:-150px;
width:70px;
height:90px;
border-radius:50%;
animation:float 10s linear infinite;
opacity:.9;
}

.balloon:after{
content:'';
position:absolute;
left:35px;
top:90px;
width:2px;
height:120px;
background:white;
}

.red{
background:#ff4d4d;
left:10%;
animation-duration:9s;
}

.blue{
background:#4da6ff;
left:30%;
animation-duration:12s;
}

.green{
background:#66ff66;
left:60%;
animation-duration:11s;
}

.yellow{
background:#ffff66;
left:85%;
animation-duration:13s;
}

@keyframes float{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-120vh);
}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

@media(max-width:600px){

h1{
font-size:32px;
}

h2{
font-size:22px;
}

p{
font-size:16px;
}

.card{
padding:20px;
}

button{
font-size:16px;
}

.balloon{
width:50px;
height:70px;
}

.balloon:after{
left:25px;
height:90px;
}

}

</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="balloon red"></div>
<div class="balloon blue"></div>
<div class="balloon green"></div>
<div class="balloon yellow"></div>
<div class="balloon pink"></div>


<div class="container">

<div class="card">

<h1>🎂 Happy Birthday rishu<3 🎉</h1>

<h2>Dear phool ❤️</h2>

<p>
Happy Birthday, baby! ❤️
 You are the reason behind my happiest smiles.
 May your day be as beautiful,
 sweet, and special as you are.
 Love you endlessly <3 ..!!
🎁🎈🎂
</p>

<button onclick="celebrate()">
🎉 Celebrate
</button>

</div>

</div>

<script>

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let pieces=[];

function randomColor(){
const colors=[
"#ff4d4d",
"#00ccff",
"#ffff33",
"#66ff66",
"#ff66cc",
"#ffffff",
"#ffa500"
];
return colors[Math.floor(Math.random()*colors.length)];
}

function createConfetti(){

for(let i=0;i<250;i++){

pieces.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height-canvas.height,

size:Math.random()*8+4,

speed:Math.random()*3+2,

color:randomColor(),

angle:Math.random()*360

});

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{

ctx.save();

ctx.translate(p.x,p.y);

ctx.rotate(p.angle);

ctx.fillStyle=p.color;

ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);

ctx.restore();

p.y+=p.speed;
p.angle+=0.05;

if(p.y>canvas.height){

p.y=-20;
p.x=Math.random()*canvas.width;

}

});

requestAnimationFrame(draw);

}

createConfetti();
draw();

function celebrate(){

pieces=[];

createConfetti();

}

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

});

</script>

</body>
</html>
